<!DOCTYPE html>
<html lang="en">
<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="theme-color" content="#14150f">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="description" content="DayZ Crafting Guide – All recipes at a glance">
	<link rel="manifest" href="manifest.json">
	<link rel="apple-touch-icon" href="icon-192.png">
	<title>DayZ Crafting Guide</title>

	<style>

		:root {
			--bg:        #14150f;
			--bg-panel:  rgba( 20, 22, 18, 0.82 );
			--bg-row:    rgba( 28, 31, 26, 0.55 );
			--line:      rgba( 120, 130, 110, 0.18 );
			--text:      #d6d8cf;
			--text-dim:  #8b9082;
			--text-head: #e8eae2;
			--energy:    #d9a441;
			--water:     #5aa9d6;
			--danger:    #c8503c;
			--accent:    #aeb89a;
			--pad:        32px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			-webkit-tap-highlight-color: transparent;
		}

		html, body {
			background: var( --bg );
			color: var( --text );
			font-family: "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
			font-size: 16px;
			line-height: 1.4;
			min-height: 100%;
			min-height: 100dvh;
			-webkit-font-smoothing: antialiased;
			overscroll-behavior: none;
		}

		body {
			background-image:
				linear-gradient( rgba( 16, 17, 13, 0.85 ), rgba( 16, 17, 13, 0.93 ) ),
				radial-gradient( circle at 30% 0%, #2c3327 0%, #14150f 60% );
			background-attachment: fixed;
		}

		.app {
			max-width: 1400px;
			margin: 0 auto;
		}

		/* Install banner */

		.install-banner {
			display: none;
			margin: 12px var( --pad ) 0;
			padding: 12px 16px;
			background: rgba( 174, 184, 154, 0.1 );
			border: 1px solid rgba( 174, 184, 154, 0.25 );
			border-radius: 6px;
			font-size: 13px;
			line-height: 1.5;
			text-align: center;
			color: var( --accent );
		}

		/* Header */

		.app__header {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 16px;
			padding: 20px var( --pad ) 16px;
		}

		.logo {
			display: block;
			width: 110px;
			height: auto;
		}

		.app__sub {
			margin-top: 6px;
			font-size: 11px;
			letter-spacing: 1px;
			color: var( --text-dim );
			text-transform: uppercase;
		}

		/* Language switch */

		.lang {
			display: flex;
			flex-shrink: 0;
			gap: 2px;
			padding: 3px;
			background: rgba( 10, 11, 8, 0.6 );
			border: 1px solid var( --line );
			border-radius: 7px;
		}

		.lang__btn {
			padding: 6px 11px;
			background: transparent;
			border: none;
			border-radius: 5px;
			color: var( --text-dim );
			font-family: inherit;
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.5px;
			cursor: pointer;
			transition: color 0.15s, background 0.15s;
		}

		.lang__btn--active {
			color: #14150f;
			background: var( --accent );
		}

		/* Controls */

		.controls {
			padding: 0 var( --pad ) 14px;
			position: sticky;
			top: 0;
			z-index: 100;
		}

		.controls__card {
			padding: 14px 16px;
			background: var( --bg-panel );
			backdrop-filter: blur( 6px );
			border: 1px solid var( --line );
			border-radius: 6px;
		}

		.controls__top {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.search {
			flex: 1;
			padding: 10px 14px;
			background: rgba( 10, 11, 8, 0.7 );
			border: 1px solid var( --line );
			border-radius: 6px;
			color: var( --text );
			font-family: inherit;
			font-size: 14px;
			outline: none;
			transition: border-color 0.15s;
		}

		.search::placeholder {
			color: var( --text-dim );
		}

		.search:focus {
			border-color: var( --accent );
		}

		.controls__count {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			color: var( --text-dim );
			white-space: nowrap;
			flex-shrink: 0;
		}

		.controls__count span {
			color: var( --accent );
		}

		.chips {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-top: 14px;
		}

		.chips__btn {
			padding: 6px 13px;
			background: var( --bg-row );
			border: 1px solid var( --line );
			border-radius: 20px;
			color: var( --text-dim );
			font-family: inherit;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: color 0.15s, background 0.15s, border-color 0.15s;
		}

		.chips__btn:hover {
			color: #14150f;
			background: var( --accent );
			border-color: var( --accent );
		}

		.chips__btn--active {
			color: #14150f;
			background: var( --accent );
			border-color: var( --accent );
		}

		/* Grid */

		.list {
			padding: 20px var( --pad );
		}

		.recipes-grid {
			display: grid;
			grid-template-columns: repeat( auto-fill, minmax( 300px, 1fr ) );
			gap: 14px;
		}

		/* Recipe Card */

		.recipe-card {
			background: var( --bg-row );
			border: 1px solid var( --line );
			border-radius: 6px;
			padding: 14px 16px;
			display: flex;
			flex-direction: column;
			gap: 9px;
			transition: border-color 0.15s, background 0.15s;
		}

		.recipe-card:hover {
			border-color: rgba( 174, 184, 154, 0.35 );
			background: rgba( 28, 31, 26, 0.8 );
		}

		.recipe-card__meta {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 8px;
			min-height: 14px;
		}

		.recipe-card__category {
			font-size: 10px;
			font-weight: 400;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			color: var( --text-dim );
		}

		.recipe-card__qty {
			font-size: 10px;
			color: var( --text-dim );
		}

		.recipe-card__result {
			font-size: 14px;
			font-weight: 600;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			color: var( --energy );
		}

		.recipe-card__formula {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 5px;
		}

		.ingredient {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			background: rgba( 20, 22, 18, 0.6 );
			border: 1px solid var( --line );
			border-radius: 3px;
			padding: 3px 7px;
			font-size: 11px;
			color: var( --text );
		}

		.ingredient__qty {
			font-size: 10px;
			font-weight: 700;
			color: var( --accent );
		}

		.formula-sep {
			font-size: 11px;
			color: var( --text-dim );
			flex-shrink: 0;
		}

		.formula-arrow {
			font-size: 11px;
			color: var( --accent );
			flex-shrink: 0;
		}

		/* Empty */

		.empty {
			grid-column: 1 / -1;
			padding: 60px 20px;
			text-align: center;
			color: var( --text-dim );
			font-size: 14px;
		}

		/* Highlight */

		mark {
			background: rgba( 217, 164, 65, 0.25 );
			color: var( --energy );
			border-radius: 2px;
			padding: 0 2px;
		}

		/* Safe area insets */

		@supports (padding-top: env(safe-area-inset-top)) {
			.app__header { padding-top: calc(20px + env(safe-area-inset-top)); }
		}

		@supports (padding-bottom: env(safe-area-inset-bottom)) {
			.list { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
		}

		/* Responsive */

		@media ( max-width: 767px ) {

			:root {
				--pad: 12px;
			}

			.recipes-grid {
				grid-template-columns: 1fr;
			}

			/* Horizontal swipe instead of wrapping – keeps the sticky filter flat */
			.chips {
				flex-wrap: nowrap;
				gap: 8px;
				overflow-x: auto;
				scroll-snap-type: x proximity;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: none;
				margin: 12px 0 0;
				padding: 0 0 2px;
			}

			.chips::-webkit-scrollbar {
				display: none;
			}

			.chips__btn {
				flex-shrink: 0;
				scroll-snap-align: start;
			}

		}

	</style>

</head>
<body>

<div id="installBanner" class="install-banner">
	Tip: Share → "Add to Home Screen" for app feel + offline use
</div>

<div class="app">

	<header class="app__header">

		<div>
			<img
				class="logo"
				src="assets/img/logo.png"
				alt="DayZ"
				width="2000"
				height="895"
			/>
			<div class="app__sub" id="subtitle"></div>
		</div>

		<div class="lang" id="langSwitch">
			<button class="lang__btn" data-lang="en">EN</button>
			<button class="lang__btn" data-lang="de">DE</button>
		</div>

	</header><!-- end /.app__header -->

	<div class="controls">

		<div class="controls__card">

			<div class="controls__top">

				<input
					type="text"
					class="search"
					id="searchInput"
					autocomplete="off"
					spellcheck="false"
				/>

				<div class="controls__count">
					<span id="countVisible">0</span> / <span id="countTotal">0</span>
				</div>

			</div><!-- end /.controls__top -->

			<div class="chips" id="chips"></div>

		</div><!-- end /.controls__card -->

	</div><!-- end /.controls -->

	<div class="list">
		<div class="recipes-grid" id="recipesGrid"></div>
	</div><!-- end /.list -->

</div><!-- end /.app -->

<script>

	// Service Worker registration
	if ( 'serviceWorker' in navigator ) {

		navigator.serviceWorker.register( './sw.js' ).then( ( reg ) => {
			reg.update();
		}).catch( ( err ) => {
			console.log( 'SW registration failed:', err );
		});

	}

	// Show install hint on iOS Safari (not in standalone mode)
	if (
		( 'standalone' in navigator && ! navigator.standalone ) &&
		/iPhone|iPad/.test( navigator.userAgent )
	) {

		const banner = document.getElementById( 'installBanner' );
		if ( banner ) banner.style.display = 'block';

	}

</script>

	// State

	const state = {
		lang:     detectLang(),
		category: 'All',
		query:    '',
	};

	// DOM refs

	const grid        = document.getElementById( 'recipesGrid' );
	const chipsEl     = document.getElementById( 'chips' );
	const searchInput = document.getElementById( 'searchInput' );
	const subtitleEl  = document.getElementById( 'subtitle' );
	const countVis    = document.getElementById( 'countVisible' );
	const countTotal  = document.getElementById( 'countTotal' );
	const langSwitch  = document.getElementById( 'langSwitch' );

	const allCategories = [ 'All', ...[ ...new Set( recipes.map( r => r.category ) ) ] ];

	countTotal.textContent = recipes.length;

	// Detect browser language

	function detectLang() {

		const lang = ( navigator.language || 'en' ).slice( 0, 2 ).toLowerCase();
		return lang === 'de' ? 'de' : 'en';

	}

	// Apply language to UI

	function applyLang() {

		const t = I18N[ state.lang ];

		document.title         = t.title;
		subtitleEl.textContent = t.subtitle;
		searchInput.placeholder = t.placeholder;

		// Lang buttons
		langSwitch.querySelectorAll( '.lang__btn' ).forEach( btn => {
			btn.classList.toggle( 'lang__btn--active', btn.dataset.lang === state.lang );
		});

		// Rebuild chips with translated labels
		buildChips();
		render();

	}

	// Build category chips

	function buildChips() {

		const t = I18N[ state.lang ];
		chipsEl.innerHTML = '';

		allCategories.forEach( cat => {

			const label = cat === 'All' ? t.all : ( t.categories[ cat ] || cat );
			const btn = document.createElement( 'button' );

			btn.className = 'chips__btn' + ( cat === state.category ? ' chips__btn--active' : '' );
			btn.textContent = label;
			btn.dataset.cat = cat;

			btn.addEventListener( 'click', () => {

				state.category = cat;
				chipsEl.querySelectorAll( '.chips__btn' ).forEach( b => b.classList.remove( 'chips__btn--active' ) );
				btn.classList.add( 'chips__btn--active' );
				render();

			});

			chipsEl.appendChild( btn );

		});

	}

	// Translate item name to active language

	function tItem( name ) {

		if ( state.lang !== 'de' ) return name;
		return ITEM_DE[ name ] || name; // fallback = English

	}

	// Highlight

	function highlight( text, query ) {

		if ( ! query ) return text;

		const escaped = query.replace( /[.*+?^${}()|[\]\\]/g, '\\$&' );
		return text.replace( new RegExp( `(${escaped})`, 'gi' ), '<mark>$1</mark>' );

	}

	// Filter

	function getFiltered() {

		const q = state.query.toLowerCase().trim();

		return recipes.filter( recipe => {

			const matchCat = state.category === 'All' || recipe.category === state.category;

			if ( ! matchCat ) return false;

			if ( ! q ) return true;

			const inResult      = recipe.result.toLowerCase().includes( q ) || tItem( recipe.result ).toLowerCase().includes( q );
			const inIngredients = recipe.ingredients.some( i => i.name.toLowerCase().includes( q ) || tItem( i.name ).toLowerCase().includes( q ) );

			return inResult || inIngredients;

		});

	}

	// Render

	function render() {

		const filtered = getFiltered();
		const q = state.query.trim();
		const t = I18N[ state.lang ];

		countVis.textContent = filtered.length;
		grid.innerHTML = '';

		if ( filtered.length === 0 ) {

			const empty = document.createElement( 'div' );
			empty.className = 'empty';
			empty.textContent = t.lang === 'de'
				? `Keine Rezepte für „${q}" gefunden.`
				: `No recipes found for "${q}".`;
			grid.appendChild( empty );
			return;

		}

		filtered.forEach( recipe => {

			const card = document.createElement( 'div' );
			card.className = 'recipe-card';

			const catLabel = state.category === 'All'
				? ( I18N[ state.lang ].categories[ recipe.category ] || recipe.category )
				: '';

			const qtyHtml = recipe.resultQty
				? `<span class="recipe-card__qty">×${recipe.resultQty}</span>`
				: '';

			const formulaHtml = recipe.ingredients.map( ( ing, idx ) => {

				const plus = idx < recipe.ingredients.length - 1
					? '<span class="formula-sep">+</span>'
					: '';

				const ingQty = ing.qty > 1
					? `<span class="ingredient__qty">${ing.qty}×</span>`
					: '';

				return `<span class="ingredient">${ingQty}${highlight( tItem( ing.name ), q )}</span>${plus}`;

			}).join( '' );

			card.innerHTML = `
				<div class="recipe-card__meta">
					<span class="recipe-card__category">${catLabel}</span>
					${qtyHtml}
				</div>
				<div class="recipe-card__result">${highlight( tItem( recipe.result ), q )}</div>
				<div class="recipe-card__formula">
					${formulaHtml}
					<span class="formula-arrow">→</span>
					<span class="ingredient">${highlight( tItem( recipe.result ), q )}</span>
				</div>
			`;

			grid.appendChild( card );

		});

	}

	// Events

	searchInput.addEventListener( 'input', () => {

		state.query = searchInput.value;
		render();

	});

	langSwitch.addEventListener( 'click', ( e ) => {

		const btn = e.target.closest( '.lang__btn' );
		if ( ! btn ) return;

		state.lang = btn.dataset.lang;
		document.documentElement.lang = state.lang;
		applyLang();

	});

	// Init

	applyLang();

})();
